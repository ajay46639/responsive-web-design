<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h1>Playing Cards</h1>
    <main id="playing-cards">

      <div class="card one">
        <div class="left">
          <span>5</span>
          <span>♦</span>
        </div>
        <div class="middle">
          <div>
            <span>♦</span>
            <span>♦</span>
          </div>
          <div>
            <span>♦</span>
          </div>
          <div>
            <span>♦</span>
            <span>♦</span>
          </div>
        </div>
        <div class="right">
          <span>5</span>
          <span>♦</span>
        </div>
      </div>

      <div class="card two">
        <div class="left">
          <p>3</p>
          <p>♣</p>
        </div>
        <div class="middle">
          <p>♣ ♣</p>
          <p>♣</p>
        </div>
        <div class="right">
          <p>3</p>
          <p>♣</p>
        </div>
      </div>

      <div class="card three">
        <div class="left">
          <p>4</p>
          <p>♥</p>
        </div>
        <div class="middle">
          <p>♥ ♥</p>
          <p>♥ ♥</p>
        </div>
        <div class="right">
          <p>4</p>
          <p>♥</p>
        </div>
      </div>

      <div class="card four">
        <div class="left">
          <span>A</span>
          <span>♠</span>
        </div>
        <div class="middle">
          <div class="image-container"><img class="card-image" src="https://i.ebayimg.com/images/g/ocUAAOSw8iJfTJQ1/s-l1600.webp"></div>
        </div>
        <div class="right">
          <span>A</span>
          <span>♠</span>
        </div>
      </div>  

      <div class="card five">
        <div class="left">
          <p>A</p>
          <p>♠</p>
        </div>
        <div class="middle">
          <div class="image-container-2">
            <img class="card-image-2" src="https://www.pngall.com/wp-content/uploads/15/Ace-of-Spades-PNG-Pic.png" >
          </div>
        </div>
        <div class="right">
          <p>A</p>
          <p>♠</p>
        </div>
      </div>  
    </main>
  </div>
</body>

</html>
